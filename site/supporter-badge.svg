<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <linearGradient id="inner-bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1a1f35"/>
      <stop offset="100%" stop-color="#0f1225"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="#06060b"/>

  <!-- Shield outer (gold border) -->
  <path d="M400,75 L575,132 C590,137 600,152 600,167 L600,395 C600,420 585,442 563,454 L400,545 L237,454 C215,442 200,420 200,395 L200,167 C200,152 210,137 225,132 Z" fill="#e8a838"/>

  <!-- Shield inner -->
  <path d="M400,90 L565,143 C577,147 585,159 585,172 L585,388 C585,410 572,430 553,440 L400,527 L247,440 C228,430 215,410 215,388 L215,172 C215,159 223,147 235,143 Z" fill="url(#inner-bg)"/>

  <!-- Inner hexagon accent -->
  <polygon points="400,145 485,182 485,318 400,355 315,318 315,182" fill="none" stroke="#e8a838" stroke-width="1.5" opacity="0.4"/>

  <!-- Anvil -->
  <!-- Face -->
  <rect x="360" y="230" width="80" height="10" rx="2" fill="#94a3b8"/>
  <!-- Horn (left taper) -->
  <polygon points="360,230 360,240 335,236 335,234" fill="#94a3b8"/>
  <polygon points="335,234 335,236 325,235.5" fill="#7a8a9a"/>
  <!-- Heel (right block) -->
  <rect x="440" y="230" width="15" height="10" rx="2" fill="#94a3b8"/>
  <!-- Body -->
  <polygon points="370,240 365,275 435,275 430,240" fill="#7a8a9a"/>
  <!-- Waist -->
  <rect x="385" y="275" width="30" height="15" fill="#64748b"/>
  <!-- Base -->
  <polygon points="372" fill="#475569"/>
  <polygon points="375,290 370,310 430,310 425,290" fill="#475569"/>

  <!-- Hammer -->
  <!-- Handle (diagonal) -->
  <line x1="425" y1="190" x2="380" y2="225" stroke="#7a8a9a" stroke-width="4" stroke-linecap="round"/>
  <!-- Head -->
  <rect x="415" y="180" width="30" height="14" rx="3" fill="#94a3b8" transform="rotate(-40, 430, 187)"/>

  <!-- Spark accents (from hammer strike) -->
  <circle cx="390" cy="218" r="2.5" fill="#fbbf24" opacity="0.9"/>
  <circle cx="378" cy="210" r="1.8" fill="#fbbf24" opacity="0.7"/>
  <circle cx="400" cy="212" r="1.5" fill="#fbbf24" opacity="0.8"/>
  <circle cx="385" cy="205" r="1.2" fill="#fbbf24" opacity="0.6"/>
  <circle cx="395" cy="222" r="1" fill="#fbbf24" opacity="0.7"/>

  <!-- FORGESWORN text -->
  <text x="400" y="395" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="28" font-weight="bold" letter-spacing="3" fill="#e8a838">FORGESWORN</text>

  <!-- Decorative stars -->
  <text x="305" y="398" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#e8a838" opacity="0.8">&#x2726;</text>
  <text x="495" y="398" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#e8a838" opacity="0.8">&#x2726;</text>

  <!-- Subtitle -->
  <text x="400" y="420" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="15" letter-spacing="5" fill="#94a3b8">SUPPORTER</text>
</svg>
